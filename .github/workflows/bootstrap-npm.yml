name: Bootstrap npm packages (one-shot)

# One-shot helper to publish 0.0.0-bootstrap stubs for new npm package
# names so the putitoutthere release workflow can publish real versions
# via OIDC trusted publishing afterwards. npm trusted publishing binds
# to an already-published package, so the first publish needs a classic
# token; this workflow is the bootstrap path.
#
# Usage:
#   1. Create a granular npm automation token (read+write, short expiry)
#      and set it as repo secret NPM_TOKEN.
#   2. gh workflow run bootstrap-npm.yml -f packages="bin-shim"
#   3. Once stubs land, register Trusted Publishers on each package's
#      npm settings page pointing at this repo + release.yml + the
#      "release" environment.
#   4. Delete the NPM_TOKEN secret.
#   5. Re-trigger Release; the engine publishes real versions over the
#      bootstrap stubs via OIDC.
#
# This file can be removed once all bin-shim npm names exist on the
# registry — its only job is the first-publish bootstrap.

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated list of npm package names to bootstrap'
        required: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish bootstrap stubs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGES: ${{ inputs.packages }}
        run: |
          set -euo pipefail
          IFS=',' read -ra PKGS <<< "$PACKAGES"
          for name in "${PKGS[@]}"; do
            name="${name// /}"
            echo "::group::publish 0.0.0-bootstrap for $name"
            dir=$(mktemp -d)
            pushd "$dir" > /dev/null
            cat > package.json <<EOF
          {
            "name": "$name",
            "version": "0.0.0-bootstrap",
            "description": "Bootstrap stub; replaced on first real publish via OIDC trusted publisher.",
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/thekevinscott/bin-shim.git"
            }
          }
          EOF
            # --tag bootstrap: 0.0.0-bootstrap is a prerelease (hyphen),
            # which npm refuses to publish as `latest`. Tag it explicitly
            # so the real 0.1.0 publish is the one that becomes `latest`.
            npm publish --access public --tag bootstrap
            popd > /dev/null
            rm -rf "$dir"
            echo "::endgroup::"
          done
